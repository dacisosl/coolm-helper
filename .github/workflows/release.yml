# 릴리스 자동화 (클라우드 Windows 빌드) — release.py의 클라우드판.
#
# 실행 방법: version.py의 APP_VERSION을 올리고 release_notes.txt(첫 줄=제목,
# 나머지=안내문)를 수정해서 main에 push하면 자동 실행된다.
# (GitHub → Actions → release → Run workflow 수동 실행도 가능)
#
# 순서: 테스트 → 빌드 → 설치파일 → GitHub 릴리스 → version.json push.
# version.json이 main에 올라가는 순간, 사용자 앱이 시작할 때 업데이트를
# 안내한다. 같은 버전 릴리스가 이미 있으면 릴리스 단계에서 멈춘다(중복 방지).
name: release

on:
  push:
    branches: ["main"]
    paths: ["release_notes.txt"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUTF8: "1"   # Windows 콘솔(cp1252)에서 한글 출력이 깨지지 않게

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 30   # 테스트가 멈춰도 6시간 러너 낭비 방지
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          # 사용자 PC의 기존 설치(로컬 3.13 빌드)와 부품이 섞여도 안전하도록
          # 같은 버전 유지
          python-version: "3.13"

      - name: 버전·제목·노트 읽기 (version.py + release_notes.txt)
        shell: python
        run: |
          import os, re
          ver = re.search(r'APP_VERSION = "([^"]+)"',
                          open("version.py", encoding="utf-8").read()).group(1)
          lines = open("release_notes.txt",
                       encoding="utf-8").read().strip().splitlines()
          title = lines[0].strip()
          notes = "\n".join(lines[1:]).strip() or title
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"VER={ver}\n")
              f.write(f"TITLE={title}\n")
              f.write("NOTES<<__EOF__\n" + notes + "\n__EOF__\n")

      - name: 의존성 설치
        run: pip install -r requirements.txt pyinstaller

      - name: installer.iss 버전 맞추기
        shell: python
        run: |
          import os, re
          ver = os.environ["VER"]
          text = open("installer.iss", encoding="utf-8").read()
          open("installer.iss", "w", encoding="utf-8", newline="").write(
              re.sub(r'#define AppVersion "[^"]+"',
                     f'#define AppVersion "{ver}"', text))

      - name: 테스트
        run: python -m unittest discover -s tests

      - name: 빌드 (PyInstaller)
        run: python build.py

      - name: 한국어 설치 언어파일 준비 (없으면 영어 설치 문구로 대체)
        shell: python
        run: |
          import os, urllib.request
          dst = r"C:\Program Files (x86)\Inno Setup 6\Languages\Korean.isl"
          if os.path.exists(dst):
              print("Korean.isl 이미 있음")
          else:
              urls = [
                  "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Korean.isl",
                  "https://raw.githubusercontent.com/jrsoftware/issrc/master/Files/Languages/Unofficial/Korean.isl",
                  "https://jrsoftware.org/files/istrans/i/Korean.isl",
              ]
              for u in urls:
                  try:
                      urllib.request.urlretrieve(u, dst)
                      print("받음:", u)
                      break
                  except Exception as e:
                      print("실패:", u, e)
              else:
                  # 못 구하면 설치 마법사 문구만 영어로 (앱 자체는 한국어 그대로)
                  text = open("installer.iss", encoding="utf-8").read()
                  text = text.replace(
                      'Name: "korean"; MessagesFile: "compiler:Languages\\Korean.isl"',
                      'Name: "english"; MessagesFile: "compiler:Default.isl"')
                  open("installer.iss", "w", encoding="utf-8",
                       newline="").write(text)
                  print("한국어 파일을 못 구해 영어 설치 문구로 대체")

      - name: 설치파일 만들기 (Inno Setup)
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: GitHub 릴리스 올리기
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$env:VER" "Output/CoolmHelper-Setup.exe" `
            --title "v$env:VER — $env:TITLE" --notes "$env:NOTES"

      - name: version.json 갱신 (자동 업데이트 신호)
        shell: python
        run: |
          import json, os
          ver = os.environ["VER"]
          data = {"version": ver,
                  "url": ("https://github.com/${{ github.repository }}/"
                          f"releases/download/v{ver}/CoolmHelper-Setup.exe"),
                  "notes": os.environ["NOTES"]}
          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

      - name: main에 커밋·푸시
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer.iss version.json
          git commit -m "release: v$env:VER (version.json 갱신 - 자동 업데이트 신호)"
          git push origin main
